<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Стабильные версии библиотек -->
    <script src="https://aframe.io"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
      /* Убираем лишние отступы, чтобы камера была на весь экран */
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <!-- Добавили uiLoading: yes, чтобы на экране крутилась иконка загрузки, пока включается камера -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: yes; uiScanning: yes;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="myModel" src="./scene.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      
        <!-- Анимация активируется через animation-mixer -->
        <a-gltf-model src="#myModel" position="0 0 0" rotation="0 0 0" scale="1 1 1" animation-mixer></a-gltf-model>
      

    </a-scene>
  </body>
</html>
