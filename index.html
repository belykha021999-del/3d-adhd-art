<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Graffiti Simple</title>
    <!-- Базовый фреймворк 3D -->
    <script src="https://aframe.io"></script>
    <!-- Открытый движок AR.js -->
    <script src="https://githack.com"></script>
    <!-- Проигрыватель анимации из Blender -->
    <script src="https://jsdelivr.net"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
  </head>
  <body>

    <!-- Инициализация камеры (работает везде, без багов) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <!-- Относительный путь к твоей рабочей модели -->
        <a-asset-item id="myModel" src="scene.glb"></a-asset-item>
      </a-assets>

      <!-- Готовый стандартный маркер 'hiro' (вшит в библиотеку по умолчанию) -->
      <a-marker preset="hiro">
        <!-- Твоя модель. scale (масштаб) можно крутить прямо тут -->
        <a-gltf-model src="#myModel" position="0 0 0" rotation="0 0 0" scale="1 1 1" animation-mixer></a-gltf-model>
      </a-marker>

      
    </a-scene>

  </body>
</html>
