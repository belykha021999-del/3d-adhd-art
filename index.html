<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR App</title>
    
    <!-- Используем обновленную стабильную ветку библиотек -->
    <script src="https://aframe.io"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      .a-enter-vr { display: none !important; }
    </style>
  </head>
  <body>

    <!-- Настройки фильтрации трекинга для устранения багов с камерой -->
    <a-scene mindar-image="imageTargetSrc: https://github.io; filterMinCF:0.001; filterBeta: 1000;" 
             embedded 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="myModel" src="https://github.io"></a-asset-item>
      </a-assets>

      <!-- Добавили правильный интерфейс камеры для WebAR -->
      <a-camera position="0 0 0" look-controls="enabled: false" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>

      
        <a-gltf-model src="#myModel" animation-mixer></a-gltf-model>
      
      
    </a-scene>

  </body>
</html>
