<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Идеально совместимые версии библиотек -->
    <script src="https://aframe.io"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <!-- Инициализация сцены с базовыми настройками -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- Загрузка вашей 3D модели -->
        <a-asset-item id="myModel" src="./scene.glb"></a-asset-item>
      </a-assets>

      <!-- Камера AR -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Точка привязки к первому маркеру из файла targets.mind -->
      
        <!-- Сама модель. Добавили параметр animation-mixer для анимации из Blender -->
        <a-gltf-model src="#myModel" 
                      position="0 0 0" 
                      rotation="0 0 0" 
                      scale="1 1 1" 
                      animation-mixer>
        </a-gltf-model>
      

    </a-scene>
  </body>
</html>
